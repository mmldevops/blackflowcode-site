<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07080B">
<title>404 — Page not found | Blackflowcode.ai</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#A4F24E;--gold-lt:#8FD943;--void:#07080B;--surf:#0E1520;--surf2:#141D2C;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--ink:#DDE4EE;--ink2:#8896AA;--ink3:#717E90;--green:#28C840;--font:'Oxanium',sans-serif;--body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--body);background:var(--void);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;-webkit-font-smoothing:antialiased}
.term-card{background:var(--surf);border:1px solid var(--border2);border-radius:14px;overflow:hidden;font-family:var(--mono);font-size:13px;width:100%;max-width:540px}
.term-bar{background:var(--surf2);padding:11px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.term-dots{display:flex;gap:6px}
.term-dot{width:11px;height:11px;border-radius:50%;background:var(--border2)}
.term-dot:nth-child(1){background:#FF5F57}
.term-dot:nth-child(2){background:#FFBD2E}
.term-dot:nth-child(3){background:#28C840}
.term-title{font-family:var(--mono);font-size:10.5px;color:var(--ink3);letter-spacing:.06em;margin-left:6px}
.term-body{padding:24px 22px 26px}
.term-line{padding:3px 0;display:flex;gap:10px;align-items:flex-start;line-height:1.6}
.term-line .p{color:var(--gold)}
.term-line .c{color:var(--ink3)}
.term-line .err{color:#FF5F57;font-weight:500}
.term-line .val{color:#fff}
.term-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.headline{font-family:var(--font);font-size:clamp(26px,5vw,34px);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1.05;margin-bottom:10px}
.msg{font-family:var(--body);font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:22px}
.btns{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:8px;font-weight:600;font-size:13.5px;font-family:var(--body);transition:all .15s}
.btn-p{background:var(--gold);color:var(--void)}.btn-p:hover{background:var(--gold-lt);transform:translateY(-1px)}
.btn-s{background:transparent;color:var(--ink2);border:1px solid var(--border2)}.btn-s:hover{border-color:var(--gold);color:var(--gold)}
.caret{display:inline-block;width:7px;height:14px;background:var(--gold);margin-left:3px;animation:blink 1.1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}.caret{opacity:1}}
</style>
</head>
<body>
<main>
  <div class="term-card">
    <div class="term-bar">
      <div class="term-dots"><div class="term-dot"></div><div class="term-dot"></div><div class="term-dot"></div></div>
      <div class="term-title">blackflowcode.error</div>
    </div>
    <div class="term-body">
      <div class="term-line"><span class="p">›</span><span class="val">locate --route requested_path</span></div>
      <div class="term-line"><span class="c">  // no matching route in site map</span></div>
      <div class="term-line"><span class="err">✗ 404</span><span class="val">page not found<span class="caret" aria-hidden="true"></span></span></div>
      <hr class="term-divider">
      <h1 class="headline">This page ran off-script.</h1>
      <p class="msg">The page you're after doesn't exist or moved. Let's get you back to something that works.</p>
      <div class="btns">
        <a href="/" class="btn btn-p">Back to home</a>
        <a href="/services" class="btn btn-s">See services</a>
      </div>
    </div>
  </div>
</main>

</body>
</html>
